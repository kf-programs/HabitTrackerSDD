name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to S3 and Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync static assets to S3 (immutable)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "manifest.webmanifest"

      - name: Upload app shell files with no-cache headers
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"
          aws s3 cp dist/sw.js s3://${{ secrets.S3_BUCKET_NAME }}/sw.js \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "application/javascript; charset=utf-8"
          aws s3 cp dist/manifest.webmanifest s3://${{ secrets.S3_BUCKET_NAME }}/manifest.webmanifest \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "application/manifest+json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/" "/index.html" "/sw.js" "/manifest.webmanifest"
